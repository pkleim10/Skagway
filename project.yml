name: Skagway
options:
  bundleIdPrefix: com.machiilabs
  deploymentTarget:
    macOS: "26.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"

targets:
  Skagway:
    type: application
    platform: macOS
    sources:
      - path: Skagway
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.machiilabs.skagway
        PRODUCT_NAME: Skagway
        MARKETING_VERSION: "0.63.0"
        CURRENT_PROJECT_VERSION: "772"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_CFBundleDisplayName: Skagway
        INFOPLIST_KEY_CFBundleName: Skagway
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Mach II Labs. Skagway is free forever."
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ENABLE_PREVIEWS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Skagway/Skagway.entitlements
        # Stable Apple Development signing so TCC / Spotlight keep identity across rebuilds.
        DEVELOPMENT_TEAM: "99DA5P7M35"
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5"
        ENABLE_TESTABILITY: "YES"
    info:
      path: Skagway/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSHumanReadableCopyright: "Copyright © 2026 Mach II Labs. Skagway is free forever."
        CFBundleDocumentTypes:
          - CFBundleTypeName: Skagway Library
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            CFBundleTypeExtensions:
              - machii
    dependencies:
      - package: GRDB
        product: GRDB
  SkagwayTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SkagwayTests
    dependencies:
      - target: Skagway
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.machiilabs.skagway.tests
        GENERATE_INFOPLIST_FILE: "YES"
        DEVELOPMENT_TEAM: "99DA5P7M35"
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Skagway.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Skagway"
        BUNDLE_LOADER: "$(TEST_HOST)"
